<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Slot Machine</title>
    </head>
    <body>
        <div class="machine" id="machine"> 
            <div class="title-bar">   
                <h1>Lucky Pulls</h1>
                <p>Insert coin · Pull lever · Win big</p>
            </div>   

            <div class="stats-row">
                <div class="stat-box">
                    <label>Balance</label>
                    <span id="balance-display">100</span>
                </div>
                <div class="stat-box">
                    <label>Bet</label>
                    <span id="bet-display">5</span>
                </div>
                <div class="stat-box">
                    <label>Last Win</label>
                    <span id="win-display">0</span>
                </div>
            </div>
            
    
        </div>
    </body>
</html>
